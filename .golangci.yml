# golangci-lint configuration. Run: golangci-lint run
# version is required by golangci-lint v2+
version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck      # unchecked errors
    - govet         # suspicious constructs
    - ineffassign   # unused assignments
    - staticcheck   # broad static analysis
    - unused        # unused code
    - misspell      # common misspellings
    - revive        # style/lint rules
    - unconvert     # redundant conversions
    - bodyclose     # unclosed HTTP response bodies

  # v2: linter-specific settings live under linters.settings (was linters-settings)
  settings:
    errcheck:
      # Writes to stdout/stderr and tabwriter flushes are conventionally ignored.
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*text/tabwriter.Writer).Flush

  # v2: per-path exclusions live under linters.exclusions (was issues.exclude-rules)
  exclusions:
    rules:
      # Test helpers may intentionally ignore errors for brevity.
      - path: _test\.go
        linters:
          - errcheck

# v2: gofmt and goimports are formatters, not linters — they live here
formatters:
  enable:
    - gofmt         # formatting
    - goimports     # import grouping
