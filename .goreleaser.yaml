# GoReleaser config for charon — builds cross-platform binaries, cuts a GitHub
# release, and publishes a Homebrew formula to your tap.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy
    # Generate shell completions from the CLI itself, bundled into each archive.
    - mkdir -p completions
    - sh -c 'go run ./cmd/charon completion bash > completions/charon.bash'
    - sh -c 'go run ./cmd/charon completion zsh  > completions/charon.zsh'
    - sh -c 'go run ./cmd/charon completion fish > completions/charon.fish'

builds:
  - id: charon
    main: ./cmd/charon
    binary: charon
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: charon
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*

checksum:
  name_template: "checksums.txt"

# Publishes/updates the Homebrew formula automatically on each release.
brews:
  - name: charon
    repository:
      owner: mtty80
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/mingtheanlay/charon"
    description: "Switch Codex, Claude Code and OpenCode between endpoint + credential profiles"
    license: "MIT"
    # Shown by `brew info charon` — point users at the no-Homebrew curl installer.
    caveats: |
      Not using Homebrew? Install with one line on Linux or macOS:
        curl -fsSL https://github.com/mingtheanlay/charon/releases/latest/download/install.sh | sh
    # Install the bundled shell completions alongside the binary.
    extra_install: |
      bash_completion.install "completions/charon.bash" => "charon"
      zsh_completion.install "completions/charon.zsh" => "_charon"
      fish_completion.install "completions/charon.fish"
    # Sanity check that the installed binary runs.
    test: |
      system "#{bin}/charon", "--help"

release:
  github:
    owner: mingtheanlay
    name: charon
  # Attach the curl installer to each release so it can be fetched from the
  # release CDN (github.com/.../releases/latest/download/install.sh) instead of
  # raw.githubusercontent.com, which rate-limits (HTTP 429) by client IP.
  extra_files:
    - glob: ./scripts/install.sh
