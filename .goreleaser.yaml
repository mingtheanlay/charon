# GoReleaser config for charon — builds cross-platform binaries, cuts a GitHub
# release, and publishes a Homebrew cask to your tap.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy
    # Generate shell completions from the CLI itself, bundled into each archive.
    - mkdir -p completions
    - sh -c 'go run ./cmd/charon completion bash > completions/charon.bash'
    - sh -c 'go run ./cmd/charon completion zsh  > completions/charon.zsh'
    - sh -c 'go run ./cmd/charon completion fish > completions/charon.fish'

builds:
  - id: charon
    main: ./cmd/charon
    binary: charon
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: charon
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*

checksum:
  name_template: "checksums.txt"

# Publishes/updates the Homebrew cask automatically on each release.
# `brews` (Formula-based) is deprecated by GoReleaser in favor of `homebrew_casks`.
homebrew_casks:
  - name: charon
    repository:
      owner: mtty80
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/mingtheanlay/charon"
    description: "Switch Codex, Claude Code and OpenCode between endpoint + credential profiles"
    # Shown by `brew info --cask charon` — point users at the no-Homebrew curl installer.
    caveats: |
      Not using Homebrew? Install with one line on Linux or macOS:
        curl -fsSL https://github.com/mingtheanlay/charon/releases/latest/download/install.sh | sh
    completions:
      bash: completions/charon.bash
      zsh: completions/charon.zsh
      fish: completions/charon.fish
    # The binary is unsigned/unnotarized, so macOS quarantines it on download
    # and refuses to run it ("charon is damaged") unless the quarantine
    # attribute is stripped after install.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/charon"]
          end

release:
  github:
    owner: mingtheanlay
    name: charon
  # Attach the curl installer to each release so it can be fetched from the
  # release CDN (github.com/.../releases/latest/download/install.sh) instead of
  # raw.githubusercontent.com, which rate-limits (HTTP 429) by client IP.
  extra_files:
    - glob: ./scripts/install.sh
